<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%23d4a24e'/%3E%3Ccircle cx='26' cy='8' r='2.5' fill='%23d4a24e'/%3E%3Ccircle cx='6' cy='24' r='2.5' fill='%23d4a24e'/%3E%3Cline x1='16' y1='16' x2='26' y2='8' stroke='%23d4a24e' stroke-width='1.5'/%3E%3Cline x1='16' y1='16' x2='6' y2='24' stroke='%23d4a24e' stroke-width='1.5'/%3E%3C/svg%3E"
    />
    <title>meOS — Remember everything. Just ask.</title>
    <meta
      name="description"
      content="meOS is a personal second brain. Feed it your notes, emails, and files; it connects the dots, keeps a living wiki, and answers questions about your own life and work. Local-first and open source."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="meOS — Remember everything. Just ask." />
    <meta
      property="og:description"
      content="A personal second brain. Feed it anything; it connects the dots, keeps a living wiki, and answers questions about your life and work."
    />
    <meta property="og:url" content="https://github.com/alaaeddine-ahriz/meOS" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Avoid a flash of the wrong theme: set the class before first paint. -->
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("meos-theme");
          const dark = stored ? stored === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
