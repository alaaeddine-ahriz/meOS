# Scans pull requests for newly introduced dependencies that carry known
# high-severity vulnerabilities or non-permissive licenses, commenting the
# findings on the PR and failing if anything crosses the threshold.
name: Dependency review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      # allow the action to post a summary comment on the PR.
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Block merges that add a dependency with a high-or-worse advisory.
          fail-on-severity: high
          # Flag copyleft / non-permissive licenses for review. Adjust as the
          # project's license policy evolves.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0
          comment-summary-in-pr: always
