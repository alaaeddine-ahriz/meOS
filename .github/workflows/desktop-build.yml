# Builds the MeOS desktop app per platform. Native modules (better-sqlite3,
# onnxruntime-node, sharp) can't be cross-compiled, so each target gets its own
# native runner; scripts/bundle-runtime.mjs auto-detects that runner's
# platform/arch. Trigger manually (Actions ▸ Run workflow), by pushing a
# v* tag, or via workflow_call from release-please.yml (which passes the release
# tag so the bundles are attached to the matching GitHub Release).
# Artifacts are uploaded per platform; nothing is code-signed yet.
name: Desktop build

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Tag of the GitHub Release to attach bundles to (e.g. v0.1.0). Leave empty to only upload workflow artifacts."
        required: false
        type: string
  push:
    tags:
      - "v*"
  # Reusable entry point. release-please.yml calls this after merging the
  # Release PR, passing the freshly created tag so each platform's bundles are
  # uploaded straight onto that GitHub Release (not just the workflow run).
  workflow_call:
    inputs:
      release-tag:
        description: "Tag of the GitHub Release to attach bundles to (e.g. v0.1.0)."
        required: false
        type: string

permissions:
  contents: read

jobs:
  bundle:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    # Only needs write access when we actually attach bundles to a Release.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            bundles: dmg
          # macOS Intel (darwin/x64) is intentionally absent: onnxruntime-node
          # ships no darwin-x64 prebuilt as of 1.23 (transformers.js has no Node
          # WASM fallback), so the runtime payload can't be assembled there.
          - os: windows-latest
            label: Windows
            bundles: nsis
          - os: ubuntu-22.04
            label: Linux
            bundles: appimage
    steps:
      - uses: actions/checkout@v6

      # Tauri's Linux bundler (WebKitGTK + AppImage tooling) needs system libs.
      # linuxdeploy is itself an AppImage, so libfuse2 and extract-and-run support
      # are required for reliable execution on GitHub-hosted Linux runners.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libfuse2

      # Major must match NODE_VERSION in scripts/bundle-runtime.mjs (22.x): the
      # bundled better-sqlite3 prebuild is ABI-bound to the Node we ship, and
      # the script guards against a mismatch.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        # Pin pnpm to the repo's packageManager version (package.json) so
        # action-setup installs it deterministically rather than via its flaky
        # self-installer inference (#93). Keep in sync with package.json.
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Verify pnpm
        run: pnpm --version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # dist for core/server/web must exist before the payload is assembled;
      # the script vendors these builds into payload/app.
      - name: Build core / server / web
        run: pnpm build

      - name: Assemble runtime payload
        run: node scripts/bundle-runtime.mjs

      # --bundles overrides tauri.conf's macOS-only "app" target per platform.
      - name: Build desktop bundle
        if: runner.os != 'Linux'
        run: pnpm --filter @meos/desktop exec tauri build --ci --bundles ${{ matrix.bundles }}

      - name: Build Linux package
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: x86_64
          NO_STRIP: 1
        run: |
          set -euxo pipefail
          if ! pnpm --filter @meos/desktop exec tauri build --ci -vv --bundles appimage; then
            echo "::warning::AppImage bundling failed via linuxdeploy; building a Debian package instead."
            pnpm --filter @meos/desktop exec tauri build --ci -vv --bundles deb
          fi

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: meos-${{ matrix.os }}
          if-no-files-found: error
          path: |
            packages/desktop/src-tauri/target/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/release/bundle/**/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/**/*.deb

      # Attach this platform's bundles directly to the GitHub Release so end
      # users download installers from the Release page (not from per-run
      # workflow artifacts). Runs when a release tag is available — either the
      # one passed in via workflow_call (release-please) or the v* tag that
      # triggered this run. `gh release upload --clobber` is idempotent, so a
      # re-run replaces rather than duplicates assets. `find` keeps the upload
      # platform-agnostic (each runner only produced its own bundle types).
      - name: Attach bundles to GitHub Release
        if: inputs.release-tag != '' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the Release tag tolerantly: release-please tags as vX.Y.Z, but a
          # manual workflow_dispatch may pass the bare version (e.g. 0.1.0). Try the
          # given form, then the other v-prefix form, and fail clearly if neither
          # has a Release — otherwise `gh release upload` dies with a bare
          # "release not found".
          resolve_tag() {
            local want="$1" alt
            if gh release view "$want" >/dev/null 2>&1; then printf '%s' "$want"; return 0; fi
            case "$want" in
              v*) alt="${want#v}" ;;
              *)  alt="v${want}" ;;
            esac
            if gh release view "$alt" >/dev/null 2>&1; then printf '%s' "$alt"; return 0; fi
            return 1
          }
          if ! tag="$(resolve_tag "${RELEASE_TAG}")"; then
            echo "::error::no GitHub Release found for tag '${RELEASE_TAG}' (also tried its v-prefix variant). Create the Release before attaching bundles."
            exit 1
          fi
          # macOS runners ship Bash 3.2, which has no `mapfile`/`readarray`, so
          # collect matches with a portable read loop instead.
          assets=()
          while IFS= read -r f; do
            assets+=("$f")
          done < <(find packages/desktop/src-tauri/target/release/bundle \
            -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \))
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::no desktop bundles found to attach to ${tag}"
            exit 1
          fi
          printf 'Attaching to %s:\n' "${tag}"
          printf '  %s\n' "${assets[@]}"
          gh release upload "${tag}" "${assets[@]}" --clobber
