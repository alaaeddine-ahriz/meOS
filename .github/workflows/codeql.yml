# CodeQL static analysis for meOS. Two languages run in a matrix:
#   - javascript-typescript: the pnpm workspace (core/server/web). CodeQL
#     extracts JS/TS by reading source, so `build-mode: none` is used — no
#     install/build needed, which keeps the job fast and non-flaky.
#   - rust (actions/rust): the Tauri crate in packages/desktop/src-tauri.
#     A full Tauri build needs system WebKitGTK/AppIndicator libs, so we build
#     ONLY the Rust crate with `build-mode: manual` and a plain `cargo build`
#     (no Tauri frontend/bundle step) to keep analysis self-contained and
#     reliable. See docs/security/README.md for the rationale.
name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      # required for CodeQL to upload results to the Security tab.
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            os: ubuntu-22.04
          - language: rust
            build-mode: manual
            os: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Rust uses build-mode: manual. We compile only the desktop crate to keep
      # CodeQL's extraction self-contained; the Tauri bundle/frontend is skipped
      # because it would pull in heavy system WebKit deps without improving the
      # Rust analysis surface.
      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: matrix.language == 'rust'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux build deps (Rust)
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Build Rust crate
        if: matrix.language == 'rust'
        working-directory: packages/desktop/src-tauri
        run: cargo build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
